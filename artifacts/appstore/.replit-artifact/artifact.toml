kind = "web"
previewPath = "/"
title = "App Discovery Platform"
version = "1.0.0"
id = "artifacts/appstore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23641

[services.development]
run = "pnpm --filter @workspace/appstore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/appstore", "run", "build" ]
publicDir = "artifacts/appstore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23641"
BASE_PATH = "/"
